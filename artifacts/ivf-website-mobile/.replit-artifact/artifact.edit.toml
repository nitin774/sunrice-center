kind = "mobile"
previewPath = "/mobile"
title = "Sunrise IVF Center Mobile"
version = "1.0.0"
id = "artifacts/ivf-website-mobile"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile" ]
localPort = 20707

[services.development]
run = "pnpm --filter @workspace/ivf-website-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ivf-website-mobile", "run", "build" ]
run = "pnpm --filter @workspace/ivf-website-mobile run serve"

[services.env]
PORT = "20707"
BASE_PATH = "/mobile"
