kind = "web"
previewPath = "/"
title = "Sunrice IVF Center Website"
version = "1.0.0"
id = "artifacts/ivf-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20706

[services.development]
run = "pnpm --filter @workspace/ivf-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ivf-website", "run", "build" ]
publicDir = "artifacts/ivf-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20706"
BASE_PATH = "/"
